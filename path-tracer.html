<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>path-tracer renderer</title>
    <style>
      /* Use dynamic viewport height to avoid mobile browser UI jump issues. */
      html,
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: #000;
      }

      body {
        display: grid;
        place-items: center;
      }

      /* Keep a square canvas that fits whichever viewport dimension is smaller. */
      #c {
        width: min(92vw, 92svh);
        height: auto;
        aspect-ratio: 1 / 1;
        border: 1px solid #333;
        display: block;
        image-rendering: auto;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script>
      const canvas = document.getElementById("c"),
        ctx = canvas.getContext("2d");
      let w = 0,
        h = 0,
        acc = null;
      let samples = 0,
        maxSamples = 200,
        runId = 0;
      const HIT_EPS = 1e-4,
        RAY_BIAS = 1e-3,
        MAX_DEPTH = 12,
        RR_START_DEPTH = 3,
        RR_KEEP_PROB = 0.8;

      const _v = (x, y, z) => ({ x, y, z }),
        dot = (a, b) => a.x * b.x + a.y * b.y + a.z * b.z,
        add = (a, b) => _v(a.x + b.x, a.y + b.y, a.z + b.z),
        sub = (a, b) => _v(a.x - b.x, a.y - b.y, a.z - b.z),
        mul = (a, s) => _v(a.x * s, a.y * s, a.z * s),
        cross = (a, b) =>
          _v(
            a.y * b.z - a.z * b.y,
            a.z * b.x - a.x * b.z,
            a.x * b.y - a.y * b.x,
          ),
        norm = (v) => mul(v, 1 / Math.sqrt(dot(v, v)));

      function cosineSampleHemisphere(n) {
        const r1 = Math.random();
        const r2 = Math.random();
        const phi = 2 * Math.PI * r1;
        const sr2 = Math.sqrt(r2);

        // Local cosine-weighted direction in tangent space.
        const x = Math.cos(phi) * sr2;
        const y = Math.sin(phi) * sr2;
        const z = Math.sqrt(1 - r2);

        // Build an orthonormal basis around the shading normal.
        const up = Math.abs(n.x) > 0.1 ? _v(0, 1, 0) : _v(1, 0, 0);
        const t = norm(cross(up, n));
        const b = cross(n, t);

        return norm(add(add(mul(t, x), mul(b, y)), mul(n, z)));
      }

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      function pickQualityProfile() {
        // Treat coarse pointers or narrow screens as likely mobile devices.
        const coarsePointer = matchMedia("(pointer: coarse)").matches;
        const narrowViewport = matchMedia("(max-width: 768px)").matches;
        const isMobile = coarsePointer || narrowViewport;
        const hw = navigator.hardwareConcurrency || 8;
        const lowPower = hw <= 4;

        let baseScale = isMobile ? 0.55 : 0.9;
        let targetSamples = isMobile ? 120 : 220;

        if (lowPower) {
          // Reduce load on low-core devices to preserve responsiveness.
          baseScale *= 0.8;
          targetSamples = Math.min(targetSamples, 90);
        }

        return {
          baseScale: clamp(baseScale, 0.35, 1),
          targetSamples,
        };
      }

      function configureRenderTargets() {
        // Cap DPR to avoid excessively large buffers on high-density phones.
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const cssSize = Math.floor(
          Math.min(window.innerWidth * 0.92, window.innerHeight * 0.92),
        );
        const profile = pickQualityProfile();

        maxSamples = profile.targetSamples;

        const targetInternal = clamp(
          Math.round(cssSize * dpr * profile.baseScale),
          128,
          700,
        );

        canvas.width = targetInternal;
        canvas.height = targetInternal;
        w = canvas.width;
        h = canvas.height;
        acc = new Float32Array(w * h * 3);
        samples = 0;
      }

      const scene = [
        {
          p: _v(0, -100.5, 0),
          r: 100,
          c: _v(0.74, 0.72, 0.68),
          e: _v(0, 0, 0),
        }, // Floor
        {
          p: _v(0, 100.5, 0),
          r: 100,
          c: _v(0.7, 0.7, 0.7),
          e: _v(4.8, 4.2, 3.6),
        }, // Light Ceiling
        { p: _v(0, 0, 101), r: 100, c: _v(0.62, 0.66, 0.72), e: _v(0, 0, 0) }, // Back
        { p: _v(-101, 0, 0), r: 100, c: _v(0.85, 0.18, 0.14), e: _v(0, 0, 0) }, // Red Wall
        { p: _v(101, 0, 0), r: 100, c: _v(0.16, 0.26, 0.86), e: _v(0, 0, 0) }, // Blue Wall
        {
          p: _v(-0.3, -0.2, 0),
          r: 0.3,
          c: _v(0.94, 0.86, 0.72),
          e: _v(0, 0, 0),
        }, // Sphere 1
        {
          p: _v(0.3, -0.1, 0.5),
          r: 0.4,
          c: _v(0.78, 0.9, 0.96),
          e: _v(0, 0, 0),
        }, // Sphere 2
      ];
      const light = scene[1];

      function toneMapACES(x) {
        return clamp(
          (x * (2.51 * x + 0.03)) / (x * (2.43 * x + 0.59) + 0.14),
          0,
          1,
        );
      }

      function intersectScene(o, d, tMax = 1e9) {
        let t = tMax,
          obj = null;
        for (let s of scene) {
          let b = dot(sub(o, s.p), d),
            c = dot(sub(o, s.p), sub(o, s.p)) - s.r * s.r,
            h = b * b - c;
          if (h < 0) continue;
          let res = -b - Math.sqrt(h);
          if (res > HIT_EPS && res < t) {
            t = res;
            obj = s;
          }
        }
        return { t, obj };
      }

      // Step 1: next-event estimation by explicitly sampling a point on the light.
      function estimateDirectLight(p, n) {
        const u = Math.random();
        const v = Math.random();
        const z = 1 - 2 * u;
        const r = Math.sqrt(Math.max(0, 1 - z * z));
        const phi = 2 * Math.PI * v;
        const lp = add(
          light.p,
          _v(
            light.r * r * Math.cos(phi),
            light.r * z,
            light.r * r * Math.sin(phi),
          ),
        );

        const toL = sub(lp, p);
        const dist2 = dot(toL, toL);
        if (dist2 <= 1e-12) return _v(0, 0, 0);
        const dist = Math.sqrt(dist2);
        const wi = mul(toL, 1 / dist);

        const nDotL = Math.max(0, dot(n, wi));
        if (nDotL <= 0) return _v(0, 0, 0);

        // Light emits from the inward-facing side of the ceiling sphere.
        const lightInwardNormal = norm(sub(light.p, lp));
        const lDot = Math.max(0, dot(lightInwardNormal, mul(wi, -1)));
        if (lDot <= 0) return _v(0, 0, 0);

        // Shadow test: if something is hit before the sampled light point, it is occluded.
        const shadow = intersectScene(
          add(p, mul(n, RAY_BIAS)),
          wi,
          dist - HIT_EPS,
        );
        if (shadow.obj) return _v(0, 0, 0);

        const pdf = 1 / (4 * Math.PI * light.r * light.r);
        const geometry = (nDotL * lDot) / dist2;
        return mul(light.e, geometry / pdf);
      }

      // Traces one ray path recursively and returns incoming radiance.
      function trace(o, d, depth) {
        const hit = intersectScene(o, d);
        const t = hit.t;
        const obj = hit.obj;
        // Stop when we miss geometry or reach max bounce depth.
        if (!obj || depth >= MAX_DEPTH) return _v(0, 0, 0);
        let p = add(o, mul(d, t)),
          n = norm(sub(p, obj.p));

        // Step 1 direct-light term reduces noise by sampling the emitter explicitly.
        const direct = estimateDirectLight(p, n);
        // Cosine-weighted hemisphere bounce for lower-variance Lambertian sampling.
        let rd = cosineSampleHemisphere(n);
        const nextOrigin = add(p, mul(n, RAY_BIAS));

        // Step 2: Russian roulette skips some deep paths and rescales survivors.
        // This preserves expected energy while reducing wasted recursion work.
        let bce = _v(0, 0, 0);
        if (depth >= RR_START_DEPTH) {
          if (Math.random() < RR_KEEP_PROB) {
            bce = mul(trace(nextOrigin, rd, depth + 1), 1 / RR_KEEP_PROB);
          }
        } else {
          bce = trace(nextOrigin, rd, depth + 1);
        }

        // Add emitted light and modulate bounced light by surface color (albedo).
        return add(
          obj.e,
          _v(
            obj.c.x * (direct.x + bce.x),
            obj.c.y * (direct.y + bce.y),
            obj.c.z * (direct.z + bce.z),
          ),
        );
      }

      // Renders one progressive sample per pixel and accumulates over frames.
      function draw() {
        // Snapshot run id so old animation loops can self-cancel after restart().
        const localRunId = runId;
        let img = ctx.getImageData(0, 0, w, h);

        function frame() {
          if (localRunId !== runId) return;
          samples++;
          for (let i = 0; i < w * h; i++) {
            let x = i % w,
              y = (i / w) | 0;
            // Jitter camera rays within each pixel for stochastic anti-aliasing.
            const u = (x + Math.random()) / w;
            const v = (y + Math.random()) / h;
            let d = norm(_v((u - 0.5) * 0.92, (0.5 - v) * 0.92, -1));
            let c = trace(_v(0, 0, 2.5), d, 0);
            acc[i * 3] += c.x;
            acc[i * 3 + 1] += c.y;
            acc[i * 3 + 2] += c.z;
            // Filmic display mapping with a subtle vignette for a softer final image.
            const nx = ((x + 0.5) / w) * 2 - 1;
            const ny = ((y + 0.5) / h) * 2 - 1;
            const vignette = clamp(1 - 0.16 * (nx * nx + ny * ny), 0.82, 1);
            const exposure = 0.92;
            // Slight warm balance avoids sterile white clipping in bright regions.
            const lr = (acc[i * 3] / samples) * exposure * vignette * 1.02;
            const lg = (acc[i * 3 + 1] / samples) * exposure * vignette * 0.99;
            const lb = (acc[i * 3 + 2] / samples) * exposure * vignette * 0.95;
            img.data[i * 4] = Math.pow(toneMapACES(lr), 1 / 2.2) * 255;
            img.data[i * 4 + 1] = Math.pow(toneMapACES(lg), 1 / 2.2) * 255;
            img.data[i * 4 + 2] = Math.pow(toneMapACES(lb), 1 / 2.2) * 255;
            img.data[i * 4 + 3] = 255;
          }
          ctx.putImageData(img, 0, 0);

          // Keep refining until target sample count is reached.
          if (samples < maxSamples) requestAnimationFrame(frame);
        }

        frame();
      }

      function restart() {
        // Increment run id to invalidate any in-flight frame loops.
        runId++;
        configureRenderTargets();
        draw();
      }

      let resizeTimer = 0;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        // Debounce resize/orientation changes to avoid repeated heavy resets.
        resizeTimer = setTimeout(restart, 120);
      });

      restart();
    </script>
  </body>
</html>
