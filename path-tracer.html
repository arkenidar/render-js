<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>path-tracer renderer</title>
    <style>
      /* Use dynamic viewport height to avoid mobile browser UI jump issues. */
      html,
      body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background: #000;
      }

      body {
        display: grid;
        place-items: center;
      }

      /* Keep a square canvas that fits whichever viewport dimension is smaller. */
      #c {
        width: min(92vw, 92svh);
        height: auto;
        aspect-ratio: 1 / 1;
        border: 1px solid #333;
        display: block;
        image-rendering: auto;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <script>
      const canvas = document.getElementById("c"),
        ctx = canvas.getContext("2d");
      let w = 0,
        h = 0,
        acc = null;
      let samples = 0,
        maxSamples = 200,
        runId = 0,
        phaseIndex = 0,
        phaseScales = [1],
        phaseSampleCaps = [200];
      const HIT_EPS = 1e-4,
        RAY_BIAS = 1e-3;

      const _v = (x, y, z) => ({ x, y, z }),
        dot = (a, b) => a.x * b.x + a.y * b.y + a.z * b.z,
        add = (a, b) => _v(a.x + b.x, a.y + b.y, a.z + b.z),
        sub = (a, b) => _v(a.x - b.x, a.y - b.y, a.z - b.z),
        mul = (a, s) => _v(a.x * s, a.y * s, a.z * s),
        cross = (a, b) =>
          _v(
            a.y * b.z - a.z * b.y,
            a.z * b.x - a.x * b.z,
            a.x * b.y - a.y * b.x,
          ),
        norm = (v) => mul(v, 1 / Math.sqrt(dot(v, v)));

      function cosineSampleHemisphere(n) {
        const r1 = Math.random();
        const r2 = Math.random();
        const phi = 2 * Math.PI * r1;
        const sr2 = Math.sqrt(r2);

        // Local cosine-weighted direction in tangent space.
        const x = Math.cos(phi) * sr2;
        const y = Math.sin(phi) * sr2;
        const z = Math.sqrt(1 - r2);

        // Build an orthonormal basis around the shading normal.
        const up = Math.abs(n.x) > 0.1 ? _v(0, 1, 0) : _v(1, 0, 0);
        const t = norm(cross(up, n));
        const b = cross(n, t);

        return norm(add(add(mul(t, x), mul(b, y)), mul(n, z)));
      }

      function clamp(v, lo, hi) {
        return Math.max(lo, Math.min(hi, v));
      }

      function pickQualityProfile() {
        // Treat coarse pointers or narrow screens as likely mobile devices.
        const coarsePointer = matchMedia("(pointer: coarse)").matches;
        const narrowViewport = matchMedia("(max-width: 768px)").matches;
        const isMobile = coarsePointer || narrowViewport;
        const hw = navigator.hardwareConcurrency || 8;
        const lowPower = hw <= 4;

        let baseScale = isMobile ? 0.55 : 0.9;
        let targetSamples = isMobile ? 120 : 220;

        if (lowPower) {
          // Reduce load on low-core devices to preserve responsiveness.
          baseScale *= 0.8;
          targetSamples = Math.min(targetSamples, 90);
        }

        return {
          baseScale: clamp(baseScale, 0.35, 1),
          targetSamples,
        };
      }

      function configureRenderTargets(resetPhase = true) {
        // Cap DPR to avoid excessively large buffers on high-density phones.
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const cssSize = Math.floor(
          Math.min(window.innerWidth * 0.92, window.innerHeight * 0.92),
        );
        const profile = pickQualityProfile();

        maxSamples = profile.targetSamples;
        if (resetPhase) {
          phaseIndex = 0;
          // Phase 1: fast preview, Phase 2: final quality.
          phaseScales = [
            clamp(profile.baseScale * 0.7, 0.3, 0.8),
            profile.baseScale,
          ];
          phaseSampleCaps = [
            Math.max(12, Math.floor(maxSamples * 0.35)),
            maxSamples,
          ];
        }

        const targetInternal = clamp(
          Math.round(cssSize * dpr * phaseScales[phaseIndex]),
          128,
          700,
        );

        canvas.width = targetInternal;
        canvas.height = targetInternal;
        w = canvas.width;
        h = canvas.height;
        acc = new Float32Array(w * h * 3);
        samples = 0;
      }

      const scene = [
        { p: _v(0, -100.5, 0), r: 100, c: _v(0.7, 0.7, 0.7), e: _v(0, 0, 0) }, // Floor
        { p: _v(0, 100.5, 0), r: 100, c: _v(0.7, 0.7, 0.7), e: _v(4, 4, 4) }, // Light Ceiling
        { p: _v(0, 0, 101), r: 100, c: _v(0.7, 0.7, 0.7), e: _v(0, 0, 0) }, // Back
        { p: _v(-101, 0, 0), r: 100, c: _v(0.8, 0.1, 0.1), e: _v(0, 0, 0) }, // Red Wall
        { p: _v(101, 0, 0), r: 100, c: _v(0.1, 0.1, 0.8), e: _v(0, 0, 0) }, // Blue Wall
        { p: _v(-0.3, -0.2, 0), r: 0.3, c: _v(0.9, 0.9, 0.9), e: _v(0, 0, 0) }, // Sphere 1
        { p: _v(0.3, -0.1, 0.5), r: 0.4, c: _v(0.9, 0.9, 0.9), e: _v(0, 0, 0) }, // Sphere 2
      ];

      // Traces one ray path recursively and returns incoming radiance.
      function trace(o, d, depth) {
        let t = 1e9,
          obj = null;
        // Find closest ray-sphere intersection in the scene.
        for (let s of scene) {
          let b = dot(sub(o, s.p), d),
            c = dot(sub(o, s.p), sub(o, s.p)) - s.r * s.r,
            h = b * b - c;
          if (h < 0) continue;
          let res = -b - Math.sqrt(h);
          if (res > HIT_EPS && res < t) {
            t = res;
            obj = s;
          }
        }
        // Stop when we miss geometry or reach max bounce depth.
        if (!obj || depth > 3) return _v(0, 0, 0);
        let p = add(o, mul(d, t)),
          n = norm(sub(p, obj.p));
        // Cosine-weighted hemisphere bounce for lower-variance Lambertian sampling.
        let rd = cosineSampleHemisphere(n);
        // Push secondary rays off the surface to avoid self-hit acne near contacts.
        let bce = trace(add(p, mul(n, RAY_BIAS)), rd, depth + 1);
        // Add emitted light and modulate bounced light by surface color (albedo).
        return add(
          obj.e,
          _v(obj.c.x * bce.x, obj.c.y * bce.y, obj.c.z * bce.z),
        );
      }

      // Renders one progressive sample per pixel and accumulates over frames.
      function draw() {
        // Snapshot run id so old animation loops can self-cancel after restart().
        const localRunId = runId;
        let img = ctx.getImageData(0, 0, w, h);

        function frame() {
          if (localRunId !== runId) return;
          samples++;
          for (let i = 0; i < w * h; i++) {
            let x = i % w,
              y = (i / w) | 0;
            // Jitter camera rays within each pixel for stochastic anti-aliasing.
            const u = (x + Math.random()) / w;
            const v = (y + Math.random()) / h;
            let d = norm(_v(u - 0.5, 0.5 - v, -1));
            let c = trace(_v(0, 0, 2.5), d, 0);
            acc[i * 3] += c.x;
            acc[i * 3 + 1] += c.y;
            acc[i * 3 + 2] += c.z;
            // Average all samples so far, then apply simple gamma correction.
            img.data[i * 4] = Math.pow(acc[i * 3] / samples, 0.45) * 255;
            img.data[i * 4 + 1] =
              Math.pow(acc[i * 3 + 1] / samples, 0.45) * 255;
            img.data[i * 4 + 2] =
              Math.pow(acc[i * 3 + 2] / samples, 0.45) * 255;
            img.data[i * 4 + 3] = 255;
          }
          ctx.putImageData(img, 0, 0);

          if (
            samples >= phaseSampleCaps[phaseIndex] &&
            phaseIndex < phaseScales.length - 1
          ) {
            // Progressive upscale: restart accumulation at a finer internal resolution.
            phaseIndex++;
            configureRenderTargets(false);
            draw();
            return;
          }

          // Keep refining until target sample count is reached.
          if (samples < phaseSampleCaps[phaseIndex])
            requestAnimationFrame(frame);
        }

        frame();
      }

      function restart() {
        // Increment run id to invalidate any in-flight frame loops.
        runId++;
        configureRenderTargets(true);
        draw();
      }

      let resizeTimer = 0;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        // Debounce resize/orientation changes to avoid repeated heavy resets.
        resizeTimer = setTimeout(restart, 120);
      });

      restart();
    </script>
  </body>
</html>
